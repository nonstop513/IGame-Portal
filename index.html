<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGame Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #1e2130;
      --border: rgba(255,255,255,0.08);
      --accent: #7c6ef2;
      --accent2: #f25e7c;
      --text: #e8eaf0;
      --muted: #7a7f9a;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 28px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
    }
    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }
    header p { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .project-card:hover {
      border-color: rgba(124,110,242,0.45);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }

    .card-banner {
      height: 120px;
      position: relative;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
    }
    .card-banner .badge {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .card-body { padding: 20px; }
    .card-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 18px;
    }

    .card-actions { display: flex; gap: 10px; }

    .btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: 0.85; transform: scale(0.98); }

    .btn-demo {
      background: linear-gradient(135deg, var(--accent), #5a4fcf);
      color: #fff;
    }
    .btn-report {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    .btn-disabled:hover { opacity: 0.45; transform: none; }

    .card-meta {
      display: flex;
      gap: 14px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }
    .meta-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }

    .add-card {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      min-height: 220px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .add-card .add-icon { font-size: 28px; opacity: 0.35; }

    @media (max-width: 600px) {
      header { padding: 20px; }
      main { padding: 28px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎮</div>
  <div>
    <h1>IGame Projects</h1>
    <p>遊戲分析 &amp; Demo 展示平台</p>
  </div>
</header>

<main>
  <p class="section-title">所有專案</p>

  <div class="projects">

    <!-- Sweet Frenzy -->
    <div class="project-card">
      <div class="card-banner" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
        🍭
        <span class="badge">Slot Game</span>
      </div>
      <div class="card-body">
        <div class="card-title">Sweet Frenzy</div>
        <div class="card-desc">甜蜜狂熱 — 經典水果老虎機，含多種獎勵機制與 Free Spin 系統。</div>
        <div class="card-actions">
          <a class="btn btn-demo" href="https://sweetfrenzy.nonstop2077.workers.dev/" target="_blank">
            ▶ 遊戲 Demo
          </a>
          <span class="btn btn-report btn-disabled" title="尚未實作">
            📊 分析報告
          </span>
        </div>
      </div>
      <div class="card-meta">
        <span class="meta-item"><span class="dot" style="background:#f5c542"></span> JavaScript</span>
        <span class="meta-item">🎰 Slot</span>
      </div>
    </div>

    <!-- Sugar Bang Bang -->
    <div class="project-card">
      <div class="card-banner" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        🍬
        <span class="badge">Slot Game</span>
      </div>
      <div class="card-body">
        <div class="card-title">Sugar Bang Bang</div>
        <div class="card-desc">糖果爆爆樂 — 5×4 連鎖消除老虎機，含 Free Game、乘數機制與 RTP 模擬分析。</div>
        <div class="card-actions">
          <a class="btn btn-demo" href="https://sugarkaboom.nonstop2077.workers.dev/" target="_blank">
            ▶ 遊戲 Demo
          </a>
          <span class="btn btn-report btn-disabled" title="尚未實作">
            📊 分析報告
          </span>
        </div>
      </div>
      <div class="card-meta">
        <span class="meta-item"><span class="dot" style="background:#f5c542"></span> JavaScript</span>
        <span class="meta-item">🎰 Slot</span>
        <span class="meta-item">📈 RTP Sim</span>
      </div>
    </div>

    <!-- 佔位 -->
    <div class="add-card">
      <span class="add-icon">＋</span>
      <span>更多專案即將加入</span>
    </div>

  </div>
</main>

</body>
</html>
